{% extends "offdevice/base.html" %}
{% load grape_tags %}
{% block content %}
<div id="main-body">
  <h2 class="headline">{{ community.name }}</h2>

  {% if me %}
  <form id="post-form" method="post" action="/web/posts" class="folded">
    {% csrf_token %}
    <input type="hidden" name="community_id" value="{{ community.community_id }}">
    <div class="feeling-selector">
      <label class="symbol feeling-button feeling-button-normal checked"><input type="radio" name="feeling_id" value="0" checked=""><span class="symbol-label">normal</span></label>
      <label class="symbol feeling-button feeling-button-happy"><input type="radio" name="feeling_id" value="1"><span class="symbol-label">happy</span></label>
      <label class="symbol feeling-button feeling-button-like"><input type="radio" name="feeling_id" value="2"><span class="symbol-label">like</span></label>
      <label class="symbol feeling-button feeling-button-surprised"><input type="radio" name="feeling_id" value="3"><span class="symbol-label">surprised</span></label>
      <label class="symbol feeling-button feeling-button-frustrated"><input type="radio" name="feeling_id" value="4"><span class="symbol-label">frustrated</span></label>
      <label class="symbol feeling-button feeling-button-puzzled"><input type="radio" name="feeling_id" value="5"><span class="symbol-label">puzzled</span></label>
    </div>
    <textarea name="body" class="textarea-text textarea" maxlength="1000" placeholder="Share your thoughts in a post to this community." data-open-folded-form="" data-required=""></textarea>
    <label class="spoiler-button symbol">
      <input type="checkbox" name="is_spoiler" value="1"> Spoilers
    </label>
    <div class="form-buttons">
      <input type="submit" class="black-button post-button" value="Send">
    </div>
  </form>
  {% endif %}

  <div class="post-list">
    {% include "offdevice/partials/post_list.html" %}
  </div>
</div>
{% endblock %}
