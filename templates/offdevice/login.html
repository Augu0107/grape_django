<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Grape::Account</title>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
  <style>body { padding-top: 60px; }</style>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  <meta name="format-detection" content="telephone=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body data-spy="scroll" data-target=".bs-docs-sidebar">
  <nav class="navbar navbar-default navbar-fixed-top">
    <div class="navbar-inner">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Grape::Account</a>
      </div>
    </div>
  </nav>
  <div class="container">
    <div class="page-header"><h3>Sign In</h3></div>
    <div class="col-sm-6">
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <p>Don't have an account? <a href="/web/act/create">Sign up</a></p>
      <form action="" method="post" class="form-horizontal" id="login-form">
        {% csrf_token %}
        {% if location %}<input type="hidden" name="location" value="{{ location }}">{% endif %}
        <br>
        <div class="row"><input type="text" class="form-control" name="user_id" placeholder="Login ID" required autofocus></div>
        <div class="row"><input type="password" class="form-control" name="password" placeholder="Password" required></div>
        <div class="row"><div class="form-actions"><span><br>
          <button class="btn btn-primary btn-block" type="submit">Sign In</button>
        </span></div></div>
      </form>
    </div>
  </div>
  <footer class="footer"><div class="container" style="text-align:center;"><hr>grape</div></footer>
</body>
</html>
