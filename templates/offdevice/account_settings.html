{% extends "offdevice/base.html" %}
{% block content %}
<div id="main-body">
  <h2 class="headline">Account Settings</h2>
  <form id="profile-settings-form" class="setting-form" method="post" action="/web/settings/account">
    {% csrf_token %}
    <ul class="settings-list">

      <li>
        <p class="settings-label"><label for="empathy_notice_opt_out">Do you want to receive notifications about Yeahs?</label></p>
        <div class="select-content">
          <div class="select-button">
            <select name="notify.empathy_notice_opt_out" id="empathy_notice_opt_out">
              <option value="0" {% if not profile.empathy_optout %}selected{% endif %}>Receive</option>
              <option value="1" {% if profile.empathy_optout %}selected{% endif %}>Don't Receive</option>
            </select>
          </div>
        </div>
      </li>

    </ul>
    <div class="form-buttons">
      <input type="submit" class="black-button apply-button" value="Save Settings">
    </div>
  </form>
</div>
{% endblock %}
