{% extends "offdevice/base.html" %}
{% block content %}
<div id="main-body">
  <h2 class="headline">Account Settings</h2>
  <form method="post" class="form-area">
    {% csrf_token %}
    <div class="field">
      <label>
        <input type="checkbox" name="empathy_optout" value="1" {% if profile.empathy_optout %}checked{% endif %}>
        Opt out of Yeah notifications
      </label>
    </div>
    <div class="form-buttons">
      <input type="submit" class="black-button" value="Save">
    </div>
  </form>
</div>
{% endblock %}
