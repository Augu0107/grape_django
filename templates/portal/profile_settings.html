{% extends "portal/base.html" %}
{% block body %}
<header id="header">
  <h1 id="page-title" class="">Profile Settings</h1>
</header>
<div class="body-content">
  <form method="post">
    {% csrf_token %}

    <div>
      <label>Profile Comment<br>
        <textarea name="comment" maxlength="1000" class="textbox" placeholder="Write about yourself here.">{{ profile.comment|default:'' }}</textarea>
      </label>
    </div>

    <div>
      <label>Favorite Post</label>
      <p class="note">You can set one of your own screenshot posts as your favorite from the settings button on that post.</p>
      {% if favorite_screenshot %}
      <div class="select-content">
        <img src="{{ favorite_screenshot }}">
      </div>
      {% endif %}
    </div>

    <div>
      <label for="select_gender">What is your gender?</label>
      <select name="gender" id="select_gender">
        <option value="1" {% if profile.gender == '1' %}selected{% endif %}>Male</option>
        <option value="2" {% if profile.gender == '2' %}selected{% endif %}>Female</option>
        <option value="3" {% if profile.gender == '3' or not profile.gender %}selected{% endif %}>Not applicable</option>
      </select>
    </div>

    <div>
      <label for="select_country">What is your region?</label>
      <select name="country" id="select_country">
        <option value="North America" {% if profile.country == 'North America' %}selected{% endif %}>North America</option>
        <option value="Europe" {% if profile.country == 'Europe' %}selected{% endif %}>Europe</option>
        <option value="Japan" {% if profile.country == 'Japan' %}selected{% endif %}>Japan</option>
      </select>
    </div>

    <div>
      <label for="select_game_skill">How would you describe your experience with games?</label>
      <select name="game_skill" id="select_game_skill">
        <option value="0" {% if profile.game_experience == '0' %}selected{% endif %}>Beginner</option>
        <option value="1" {% if profile.game_experience == '1' or not profile.game_experience %}selected{% endif %}>Intermediate</option>
        <option value="2" {% if profile.game_experience == '2' %}selected{% endif %}>Expert</option>
      </select>
    </div>

    <div>
      <label for="select_relationship_visibility">Who should be able to see your connections?</label>
      <select name="relationship_visibility" id="select_relationship_visibility">
        <option value="1" {% if profile.relationship_visibility == 1 or not profile.relationship_visibility %}selected{% endif %}>Everyone</option>
        <option value="2" {% if profile.relationship_visibility == 2 %}selected{% endif %}>Friends Only</option>
        <option value="3" {% if profile.relationship_visibility == 3 %}selected{% endif %}>Keep Private</option>
      </select>
    </div>

    <div>
      <label>Allow Friend Requests
        <select name="allow_request">
          <option value="1" {% if profile.allow_request == 1 or profile.allow_request is None %}selected{% endif %}>Yes</option>
          <option value="0" {% if profile.allow_request == 0 %}selected{% endif %}>No</option>
        </select>
      </label>
    </div>

    <div>
      <input type="submit" class="btn_001" value="Save">
    </div>
  </form>
</div>
{% endblock %}
