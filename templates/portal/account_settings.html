{% extends "portal/base.html" %}
{% block body %}
<header id="header">
  <h1 id="page-title" class="">Account Settings</h1>
</header>
<div class="body-content">
  <form method="post">
    {% csrf_token %}
    <div>
      <label>
        <input type="checkbox" name="empathy_optout" value="1" {% if profile.empathy_optout %}checked{% endif %}>
        Opt out of Yeah notifications
      </label>
    </div>
    <div>
      <input type="submit" class="btn_001" value="Save">
    </div>
  </form>
</div>
{% endblock %}
